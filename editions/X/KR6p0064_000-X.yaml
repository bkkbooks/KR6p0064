  text: 西方願文科大文分二初總序歸敬二正述願文初總序歸敬三初標主二明願三請加二正述願文三初求生西方正因二得生西方明驗三已生淨土大用初求生西方正因五初發起大心二懺悔業障三立願自要四求佛冥加五淨業成就二得生西方明驗三初臨終正念二感佛來迎三往生極樂三已生淨土大用四初見佛得記二蒙記具德三成德利生四普皆回向
